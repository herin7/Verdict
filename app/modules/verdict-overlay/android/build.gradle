plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.verdictoverlay'
version = '1.0.0'

android {
  namespace "expo.modules.verdictoverlay"

  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
}

dependencies {
  // This module references com.facebook.react.ReactApplication/ReactSurface
  // (ReactHost.createSurface) directly - expo-module-gradle-plugin does not
  // put react-android on an Expo module's own compile classpath by default,
  // only :app gets it. Same fix expo-dev-launcher's build.gradle uses.
  implementation 'com.facebook.react:react-android'
}
